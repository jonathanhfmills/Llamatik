name: Publish to Maven Central on Release

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: macos-14
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Debug tree
        run: |
          git submodule status --recursive || true
          ls -la
          ls -la llama.cpp || true
          find . -maxdepth 3 -type d -name "llama.cpp" -print

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Install tools
        run: |
          brew update
          brew install cmake
          cmake --version

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Configure Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compute version from tag
        id: v
        run: |
          RAW_REF="${GITHUB_REF_NAME}"
          VERSION="${RAW_REF#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # ---------- Build Android release AAR and inspect it BEFORE publishing ----------
      - name: Assemble Android Release (:library)
        run: ./gradlew :library:assembleRelease

      - name: Inspect :library AAR (classes / JNI / assets)
        run: |
          echo "Listing AAR outputs:"
          ls -la library/build/outputs/aar || true

          AAR=$(ls -1 library/build/outputs/aar/*-release.aar | head -n1 || true)
          echo "AAR=$AAR"

          if [ -z "$AAR" ] || [ ! -f "$AAR" ]; then
            echo "ERROR: AAR not found for :library"
            exit 1
          fi

          mkdir -p /tmp/aar
          unzip -q "$AAR" -d /tmp/aar

          echo "== AAR tree (top) =="
          find /tmp/aar -maxdepth 2 -type d -print

          echo "== classes.jar (first 200 entries) =="
          jar tf /tmp/aar/classes.jar | sed -n '1,200p'

          echo "== JNI libs (if any) =="
          find /tmp/aar/jni -maxdepth 3 -type f || true

          echo "== Sanity checks =="
          jar tf /tmp/aar/classes.jar | grep -E "com/llamatik/.*(platform|library)" >/dev/null \
            || (echo "ERROR: Android classes missing in AAR (androidMain not published)" && exit 1)

          # Optional: enforce arm64 .so presence if you ship JNI
          if [ -d /tmp/aar/jni ]; then
            find /tmp/aar/jni -type f | grep arm64-v8a >/dev/null \
              || (echo "ERROR: arm64-v8a .so missing in AAR" && exit 1)
          fi

      # ---------- Publish to Sonatype ----------
      - name: Publish to Sonatype (staging + release)
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          RELEASE_VERSION: ${{ steps.v.outputs.version }}
        run: |
          ./gradlew \
            -Pversion=${RELEASE_VERSION} \
            publishToSonatype \
            closeAndReleaseSonatypeStagingRepository

  desktop:
    name: Build & Upload Desktop Apps
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-latest, windows-latest]

    permissions:
      contents: write  # needed to upload assets to the GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # CI-safe overrides (your repo gradle.properties uses very large Xmx values)
      - name: Configure CI Gradle JVM args
        shell: bash
        run: |
          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=768m -XX:+UseParallelGC -Dfile.encoding=UTF-8
          kotlin.daemon.jvmargs=-Xmx2g -XX:+UseParallelGC
          org.gradle.caching=true
          org.gradle.configuration-cache=false
          EOF

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Configure Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install Linux deps (for Compose/Skiko)
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libgtk-3-dev \
            libx11-dev \
            libxext-dev \
            libxrender-dev \
            libxtst-dev \
            libxrandr-dev \
            libxi-dev \
            libxkbcommon-x11-0

      - name: Install macOS deps
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          brew update
          brew install cmake
          cmake --version

      - name: Build desktop distributables (Compose Multiplatform)
        shell: bash
        run: |
          ./gradlew :composeApp:packageReleaseDistributionForCurrentOS --no-daemon --stacktrace

      - name: Collect artifacts
        shell: bash
        run: |
          OUT="release-out"
          mkdir -p "$OUT"
          shopt -s globstar nullglob

          for f in composeApp/build/compose/binaries/main-release/**/*.{dmg,pkg,msi,exe,deb,rpm,AppImage,zip,tar.gz}; do
            echo "Found: $f"
            cp -v "$f" "$OUT/" || true
          done

          echo "Artifacts:"
          ls -la "$OUT" || true

          COUNT=$(ls -1 "$OUT" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$COUNT" -eq 0 ]; then
            echo "ERROR: No artifacts found. Check output under composeApp/build/compose/binaries/main-release/"
            find composeApp/build -maxdepth 6 -type d -print || true
            exit 1
          fi

      - name: Generate SHA256SUMS (per OS)
        shell: bash
        run: |
          cd release-out
          command -v sha256sum >/dev/null 2>&1 || { echo "sha256sum not found"; exit 1; }
          sha256sum * > "SHA256SUMS-${{ runner.os }}.txt"
          cat "SHA256SUMS-${{ runner.os }}.txt"

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release upload "$TAG" release-out/* --clobber
