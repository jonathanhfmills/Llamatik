name: Publish Desktop on Release

on:
  release:
    types: [published]

jobs:
  desktop:
    name: Build & Upload Desktop Apps
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ macos-14, ubuntu-latest, windows-latest ]

    permissions:
      contents: write  # needed to upload assets to the GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # CI-safe overrides (your repo gradle.properties uses very large Xmx values)
      - name: Configure CI Gradle JVM args
        shell: bash
        run: |
          mkdir -p ~/.gradle
          cat >> ~/.gradle/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=768m -XX:+UseParallelGC -Dfile.encoding=UTF-8
          kotlin.daemon.jvmargs=-Xmx2g -XX:+UseParallelGC
          org.gradle.caching=true
          org.gradle.configuration-cache=false
          EOF

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Configure Gradle
        uses: gradle/actions/setup-gradle@v4

      # ---------- OS dependencies ----------
      - name: Install Linux deps (Compose/Skiko + libtool)
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libtool-bin \
            libtool \
            automake \
            autoconf \
            libasound2-dev \
            libgtk-3-dev \
            libx11-dev \
            libxext-dev \
            libxrender-dev \
            libxtst-dev \
            libxrandr-dev \
            libxi-dev \
            libxkbcommon-x11-0

          echo "which libtool:"
          command -v libtool || true
          echo "which libtoolize:"
          command -v libtoolize || true

      - name: Resolve Linux tool paths
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          set -euo pipefail

          LT="$(command -v libtool || true)"
          if [ -z "$LT" ]; then
            echo "libtool not found; trying libtoolize..."
            LTZ="$(command -v libtoolize || true)"
            if [ -n "$LTZ" ]; then
              # Some projects incorrectly call this "libtool"; point LIBTOOL_PATH at libtoolize
              echo "LIBTOOL_PATH=$LTZ" >> "$GITHUB_ENV"
              echo "Using LIBTOOL_PATH=$LTZ"
              exit 0
            fi
            echo "ERROR: neither libtool nor libtoolize found"
            exit 1
          fi

          echo "LIBTOOL_PATH=$LT" >> "$GITHUB_ENV"
          echo "Using LIBTOOL_PATH=$LT"

      - name: Set LIBTOOL_PATH on Windows (CI workaround)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          "LIBTOOL_PATH=$env:WINDIR\System32\cmd.exe" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "LIBTOOL_PATH set (workaround)"

      - name: Resolve Windows tool paths
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          where.exe cmake || $true

          $candidates = @(
            "C:\Program Files\CMake\bin\cmake.exe",
            "C:\ProgramData\chocolatey\bin\cmake.exe"
          )

          $cmake = $null
          foreach ($c in $candidates) {
            if (Test-Path $c) { $cmake = $c; break }
          }

          if (-not $cmake) {
            $w = (where.exe cmake 2>$null | Select-Object -First 1)
            if ($w) { $cmake = $w }
          }

          if (-not $cmake) {
            Write-Error "cmake.exe not found after install"
            exit 1
          }

          "CMAKE_PATH=$cmake" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          & $cmake --version

      - name: Install macOS deps
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          brew update
          brew install cmake
          cmake --version

      - name: Install Windows deps (cmake + ninja)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          # Ensure cmake and ninja are installed and on PATH.
          choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' -y
          choco install ninja -y
          refreshenv
          cmake --version
          ninja --version

      - name: Resolve Windows tool paths
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          Write-Host "where cmake:"
          where.exe cmake || $true
          Write-Host "where ninja:"
          where.exe ninja || $true

          $candidates = @(
            "C:\Program Files\CMake\bin\cmake.exe",
            "C:\ProgramData\chocolatey\bin\cmake.exe"
          )

          $cmake = $null
          foreach ($c in $candidates) {
            if (Test-Path $c) { $cmake = $c; break }
          }

          if (-not $cmake) {
            $w = (where.exe cmake 2>$null | Select-Object -First 1)
            if ($w) { $cmake = $w }
          }

          if (-not $cmake) {
            Write-Error "cmake.exe not found after install"
            exit 1
          }

          Write-Host "Resolved CMAKE_PATH=$cmake"
          "CMAKE_PATH=$cmake" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          & $cmake --version

          # Ensure ninja is on PATH (choco installs to C:\ProgramData\chocolatey\bin)
          $ninjaPath = (where.exe ninja 2>$null | Select-Object -First 1)
          if ($ninjaPath) {
            $ninjaDir = Split-Path $ninjaPath -Parent
            "$ninjaDir" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
            Write-Host "Ninja dir on PATH: $ninjaDir"
          } else {
            Write-Warning "ninja not found on PATH; CMake Ninja generator may fail"
          }

      # ---------- Build ----------
      - name: Build desktop distributables (Compose Multiplatform)
        shell: bash
        run: |
          ./gradlew :composeApp:packageReleaseDistributionForCurrentOS --no-daemon --stacktrace --info

      # ---------- Collect artifacts ----------
      - name: Collect artifacts (Linux/macOS)
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        run: |
          set -euo pipefail
          OUT="release-out"
          mkdir -p "$OUT"

          find composeApp/build -type f \( \
            -iname "*.dmg" -o -iname "*.pkg" -o -iname "*.zip" -o -iname "*.tar.gz" -o \
            -iname "*.deb" -o -iname "*.rpm" -o -iname "*.AppImage" -o \
            -iname "*.msi" -o -iname "*.exe" \
          \) -exec cp -v "{}" "$OUT/" \; || true

          echo "Artifacts:"
          ls -la "$OUT" || true

      - name: Collect artifacts (Windows)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $out = "release-out"
          New-Item -ItemType Directory -Force -Path $out | Out-Null

          $patterns = @("*.msi","*.exe","*.zip","*.tar.gz","*.deb","*.AppImage")
          foreach ($p in $patterns) {
            Get-ChildItem -Path "composeApp\build" -Recurse -Include $p -ErrorAction SilentlyContinue | ForEach-Object {
              Copy-Item -Path $_.FullName -Destination $out -Force
              Write-Host "Copied $($_.FullName) to $out"
            }
          }

          Write-Host "Artifacts:"
          Get-ChildItem -Path $out | ForEach-Object { Write-Host $_.Name }

      - name: Fail if no artifacts were collected
        shell: bash
        run: |
          OUT="release-out"
          COUNT=0
          if [ -d "$OUT" ]; then
            COUNT=$(ls -1 "$OUT" 2>/dev/null | wc -l | tr -d ' ' || echo 0)
          fi
          echo "Artifact count: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            echo "ERROR: No artifacts found. Inspecting composeApp/build output:"
            find composeApp/build -maxdepth 8 -type f -print || true
            exit 1
          fi

      # ---------- Checksums ----------
      - name: Generate SHA256SUMS (Linux/macOS)
        if: ${{ runner.os != 'Windows' }}
        shell: bash
        run: |
          set -euo pipefail
          OUT="release-out"

          if [ "${RUNNER_OS}" = "Linux" ]; then
            command -v sha256sum >/dev/null 2>&1 || { echo "sha256sum not found"; exit 1; }
            (cd "$OUT" && sha256sum * > "SHA256SUMS-${RUNNER_OS}.txt")
          elif [ "${RUNNER_OS}" = "macOS" ]; then
            command -v shasum >/dev/null 2>&1 || { echo "shasum not found"; exit 1; }
            (cd "$OUT" && shasum -a 256 * > "SHA256SUMS-${RUNNER_OS}.txt")
          else
            echo "Unsupported RUNNER_OS=${RUNNER_OS}"
            exit 1
          fi

          echo "SHA256SUMS-${RUNNER_OS}.txt:"
          cat "$OUT/SHA256SUMS-${RUNNER_OS}.txt"

      - name: Generate SHA256SUMS (Windows)
        if: ${{ runner.os == 'Windows' }}
        shell: pwsh
        run: |
          $out = "release-out"
          $hashFile = Join-Path $out "SHA256SUMS-Windows.txt"
          Remove-Item -Path $hashFile -ErrorAction SilentlyContinue
          Get-ChildItem -Path $out -File | ForEach-Object {
            $h = Get-FileHash -Path $_.FullName -Algorithm SHA256
            "{0}  {1}" -f $h.Hash, $_.Name | Out-File -FilePath $hashFile -Append -Encoding utf8
          }
          Get-Content $hashFile

      # ---------- Upload ----------
      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"

          if [ ! -d "release-out" ] || [ -z "$(ls -A release-out || true)" ]; then
            echo "ERROR: release-out is empty; nothing to upload"
            exit 1
          fi

          gh release upload "$TAG" release-out/* --clobber